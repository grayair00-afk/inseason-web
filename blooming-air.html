<!DOCTYPE html><!-- Invisible Season — Blooming Air -->
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>블루밍에어 — 인비저블 시즌</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Noto+Serif+KR:wght@300;400;600&display=swap');
@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  background: #060508;
  color: #FAFAF8;
  font-family: 'Inter', 'Pretendard', sans-serif;
  -webkit-font-smoothing: antialiased;
  min-height: 100%;
}

a { color: inherit; text-decoration: none; }

/* ── BACK LINK ── */
.back {
  position: fixed;
  top: 28px; left: 32px;
  z-index: 10;
  display: inline-flex; align-items: center; gap: 7px;
  font-size: 10px; font-weight: 500; letter-spacing: 0.18em;
  color: rgba(250,250,248,0.38);
  font-family: 'Inter', sans-serif;
  transition: color 0.2s;
}
.back:hover { color: rgba(250,250,248,0.80); }
.back svg { width: 14px; height: 14px; }

/* ── MAIN ── */
main {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 80px 24px 72px;
  gap: 36px;
}

/* ── VIDEO FRAME ── */
.video-outer {
  width: 100%;
  max-width: 960px;
}

.video-frame {
  position: relative;
  width: 100%;
  aspect-ratio: 16 / 9;
  border-radius: 4px;
  overflow: hidden;
  box-shadow:
    0 0 0 1px rgba(255,255,255,0.06),
    0 24px 80px rgba(0,0,0,0.72),
    0 8px 24px rgba(0,0,0,0.48);
  background: #000;
}

/* ── POSTER ── */
.poster {
  position: absolute; inset: 0;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}

.poster img {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
  /* 유튜브 기본 썸네일에 검정 레터박스가 생길 수 있으므로 약간 확대 */
  transform: scale(1.01);
}

/* 포스터 위 어두운 오버레이 */
.poster::after {
  content: '';
  position: absolute; inset: 0;
  background: rgba(6,5,8,0.28);
  transition: background 0.3s;
}
.poster:hover::after { background: rgba(6,5,8,0.14); }

/* ── PLAY BUTTON ── */
.play-btn {
  position: relative; z-index: 2;
  width: 52px; height: 52px;
  background: none; border: none;
  cursor: pointer;
  color: rgba(250,250,248,0.82);
  transition: color 0.25s, transform 0.25s;
  display: flex; align-items: center; justify-content: center;
  padding: 0;
}
.play-btn svg { width: 52px; height: 52px; display: block; }
.poster:hover .play-btn {
  color: #FAFAF8;
  transform: scale(1.08);
}

/* ── IFRAME (재생 후) ── */
.video-frame iframe {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  border: none;
}

/* ── INFO ── */
.info {
  width: 100%;
  max-width: 960px;
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  gap: 10px;
  padding: 0 8px;
}

.info-title {
  font-family: 'Noto Serif KR', 'Pretendard', serif;
  font-size: clamp(26px, 3.8vw, 42px);
  font-weight: 400;
  letter-spacing: 0.04em;
  color: #FAFAF8;
  line-height: 1.15;
}

.info-en {
  font-family: 'Inter', sans-serif;
  font-size: 11px; font-weight: 300;
  letter-spacing: 0.36em; text-transform: uppercase;
  color: rgba(250,250,248,0.22);
  margin-top: 2px;
}

.info-divider {
  width: 32px; height: 1px;
  background: rgba(229,154,130,0.38);
  margin: 10px auto;
}

.info-artist {
  font-family: 'Inter', sans-serif;
  font-size: 11px; font-weight: 400;
  letter-spacing: 0.22em; text-transform: uppercase;
  color: rgba(250,250,248,0.38);
}

.info-credit {
  font-family: 'Inter', sans-serif;
  font-size: 9.5px; font-weight: 300;
  letter-spacing: 0.22em;
  color: rgba(250,250,248,0.18);
  margin-top: 6px;
  text-transform: uppercase;
}

/* ── MOBILE ── */
@media (max-width: 600px) {
  .back { top: 16px; left: 16px; }
  main { padding: 56px 12px 48px; gap: 20px; }
  .play-btn, .play-btn svg { width: 40px; height: 40px; }
  .info-title { font-size: clamp(22px, 6.5vw, 32px); }
  .info-en { font-size: 9px; letter-spacing: 0.28em; }
  .info-artist { font-size: 9px; letter-spacing: 0.18em; }
  .info-credit { font-size: 8px; letter-spacing: 0.18em; }
  .info-artist[style*="margin-top:57px"] { margin-top: 32px !important; }
  .info { padding: 0 4px; gap: 7px; }
}
</style>
</head>
<body>

<a class="back" href="index.html">
  <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5">
    <polyline points="9,2 4,7 9,12"/>
  </svg>
  인비저블 시즌
</a>

<main>
  <div class="video-outer">
    <div class="video-frame" id="videoFrame">

      <!-- 포스터 + 재생 버튼 -->
      <div class="poster" id="poster" onclick="loadVideo()">
        <!-- 나중에 직접 찍은 스틸로 교체 시 아래 src만 변경 -->
        <img src="https://img.youtube.com/vi/IVzu4799ERA/maxresdefault.jpg" alt="블루밍에어 포스터">
        <button class="play-btn" aria-label="재생">
          <svg viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="26" cy="26" r="24" stroke="currentColor" stroke-width="1.2" opacity="0.7"/>
            <polygon points="22,18 36,26 22,34" fill="currentColor"/>
          </svg>
        </button>
      </div>

      <!-- iframe은 클릭 후 JS로 삽입 -->

    </div>
  </div>

  <div class="info">
    <h1 class="info-title">블루밍에어</h1>
    <p class="info-en">Blooming Air</p>
    <div class="info-divider"></div>
    <p class="info-artist" style="margin-top:57px">Invisible Season</p>
    <p class="info-credit">Music · Silver Still Water</p>
    <p class="info-artist" style="margin-top:57px">Art Director · Jung.K</p>
  </div>
</main>

<!-- YouTube IFrame API -->
<script src="https://www.youtube.com/iframe_api"></script>
<script>
var player;
var videoLoaded = false;

function loadVideo() {
  if (videoLoaded) return;
  videoLoaded = true;

  var frame = document.getElementById('videoFrame');
  var poster = document.getElementById('poster');

  /* 포스터 페이드아웃 */
  poster.style.transition = 'opacity 0.3s';
  poster.style.opacity = '0';

  /* iframe 삽입 */
  var iframe = document.createElement('iframe');
  iframe.id = 'ytPlayer';
  iframe.src = 'https://www.youtube.com/embed/IVzu4799ERA'
    + '?autoplay=1&rel=0&modestbranding=1&playsinline=1&enablejsapi=1';
  iframe.allow = 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; fullscreen';
  iframe.allowFullscreen = true;
  iframe.title = '블루밍에어 — 인비저블 시즌';
  iframe.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;border:none;';

  setTimeout(function() {
    frame.appendChild(iframe);
    poster.style.display = 'none';

    /* YT API로 플레이어 연결 — BGM 정지 */
    if (window.YT && YT.Player) {
      attachPlayer(iframe.id);
    } else {
      window.onYouTubeIframeAPIReady = function() { attachPlayer(iframe.id); };
    }
  }, 300);
}

function attachPlayer(iframeId) {
  player = new YT.Player(iframeId, {
    events: {
      onStateChange: function(e) {
        /* PLAYING(1) → 이 페이지에 audio 요소가 생기면 자동 정지 */
        if (e.data === YT.PlayerState.PLAYING) {
          document.querySelectorAll('audio').forEach(function(a) {
            if (!a.paused) a.pause();
          });
        }
      }
    }
  });
}

/* 페이지 로드 즉시 자동재생 */
window.addEventListener('load', function() {
  setTimeout(loadVideo, 200);
});

function onYouTubeIframeAPIReady() {}
</script>

</body>
</html>
