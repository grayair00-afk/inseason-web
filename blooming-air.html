<!DOCTYPE html><!-- Invisible Season — Blooming Air -->
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>블루밍에어 — 인비저블 시즌</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Noto+Serif+KR:wght@300;400;600&display=swap');
@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  background: #060508;
  color: #FAFAF8;
  font-family: 'Inter', 'Pretendard', sans-serif;
  -webkit-font-smoothing: antialiased;
  min-height: 100%;
}

a { color: inherit; text-decoration: none; }

/* ── BACK LINK ── */
.back {
  position: fixed;
  top: 28px; left: 32px;
  z-index: 10;
  display: inline-flex; align-items: center; gap: 7px;
  font-size: 10px; font-weight: 500; letter-spacing: 0.18em;
  color: rgba(250,250,248,0.38);
  font-family: 'Inter', sans-serif;
  transition: color 0.2s;
}
.back:hover { color: rgba(250,250,248,0.80); }
.back svg { width: 14px; height: 14px; }

/* ── MAIN ── */
main {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 80px 24px 72px;
  gap: 36px;
}

/* ── VIDEO ── */
.video-outer {
  width: 100%;
  max-width: 960px;
}

.video-frame {
  position: relative;
  width: 100%;
  aspect-ratio: 16 / 9;
  border-radius: 4px;
  overflow: hidden;
  box-shadow:
    0 0 0 1px rgba(255,255,255,0.06),
    0 24px 80px rgba(0,0,0,0.72),
    0 8px 24px rgba(0,0,0,0.48);
}

.video-frame iframe {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  border: none;
}

/* ── INFO ── */
.info {
  width: 100%;
  max-width: 960px;
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  gap: 10px;
  padding: 0 8px;
}

.info-title {
  font-family: 'Noto Serif KR', 'Pretendard', serif;
  font-size: clamp(26px, 3.8vw, 42px);
  font-weight: 400;
  letter-spacing: 0.04em;
  color: #FAFAF8;
  line-height: 1.15;
}

.info-en {
  font-family: 'Inter', sans-serif;
  font-size: 11px; font-weight: 300;
  letter-spacing: 0.36em; text-transform: uppercase;
  color: rgba(250,250,248,0.22);
  margin-top: 2px;
}

.info-divider {
  width: 32px; height: 1px;
  background: rgba(229,154,130,0.38);
  margin: 10px auto;
}

.info-desc {
  font-family: 'Pretendard', 'Pretendard Variable', sans-serif;
  font-size: clamp(12px, 1.4vw, 14px);
  font-weight: 300;
  line-height: 2.0;
  letter-spacing: 0.03em;
  color: rgba(250,250,248,0.42);
  max-width: 480px;
}

.info-credit {
  font-family: 'Inter', sans-serif;
  font-size: 9.5px; font-weight: 300;
  letter-spacing: 0.22em;
  color: rgba(250,250,248,0.18);
  margin-top: 6px;
  text-transform: uppercase;
}

/* ── MOBILE ── */
@media (max-width: 600px) {
  .back { top: 20px; left: 20px; }
  main { padding: 64px 16px 56px; gap: 28px; }
}
</style>
</head>
<body>

<a class="back" href="index.html">
  <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5">
    <polyline points="9,2 4,7 9,12"/>
  </svg>
  인비저블 시즌
</a>

<main>
  <div class="video-outer">
    <div class="video-frame">
      <iframe
        src="https://www.youtube.com/embed/IVzu4799ERA?rel=0&modestbranding=1&color=white"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; fullscreen"
        allowfullscreen
        title="블루밍에어 — 인비저블 시즌">
      </iframe>
    </div>
  </div>

  <div class="info">
    <h1 class="info-title">블루밍에어</h1>
    <p class="info-en">Blooming Air</p>
    <div class="info-divider"></div>
    <p class="info-desc">어둠 속에서 천천히 번지는 빛.<br>피고 지는 한 계절을 담은 장면.</p>
    <p class="info-credit">Music · Clouds On The Windowsill</p>
  </div>
</main>

</body>
</html>
